<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediBot - Register</title>
    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

.register-container{
    width:420px;
    padding:40px;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.register-container h2{
    text-align:center;
    margin-bottom:30px;
    color:#06b6d4;
    font-size:32px;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
}

.input-group input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:12px;
    background:#1e293b;
    color:white;
}

.input-group input::placeholder{
    color:#94a3b8;
}

.register-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#06b6d4;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.register-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(6,182,212,.4);
}
 


.login-link{
    text-align:center;
    margin-top:20px;
}

.login-link a{
    color:#06b6d4;
    text-decoration:none;
    font-weight:600;
}

.login-link a:hover{
    text-decoration:underline;
}


.back-home{
    text-align:center;
    margin-top:20px;
}

.back-home a{
    color:white;
    text-decoration:none;
}

.back-home a:hover{
    color:#06b6d4;
}

@media(max-width:480px){
    .register-container{
        width:95%;
        padding:25px;
    }
}
</style>
</head>
<body>

    <div class="register-container">
        <h2>💊 MediBot Register</h2>

        <form>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your name" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Create password" required>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="Confirm password" required>
            </div>

            <button type="submit" class="register-btn">
                Create Account
            </button>

            <div class="login-link">
                Already have an account?
            <button><a href="/login" class="login-btn">Login</a></button> 
            </div>
        </form>
    </div>

</body>
</html>
