<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MediBot AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Inter',sans-serif;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b);
            color:white;
        }

        .login-container{
            width:420px;
            padding:40px;
            background:rgba(255,255,255,.05);
            backdrop-filter:blur(15px);
            border:1px solid rgba(255,255,255,.1);
            border-radius:25px;
            box-shadow:0 15px 40px rgba(0,0,0,.3);
        }

        .logo{
            text-align:center;
            font-size:60px;
            margin-bottom:15px;
        }

        h1{
            text-align:center;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#94a3b8;
            margin-bottom:30px;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
        }

        input{
            width:100%;
            padding:15px;
            border:none;
            outline:none;
            border-radius:12px;
            background:#1e293b;
            color:white;
        }

        input::placeholder{
            color:#94a3b8;
        }

        .login-btn{
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:#06b6d4;
            color:white;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:.3s;
        }

        .login-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 10px 25px rgba(6,182,212,.4);
        }

        .links{
            text-align:center;
            margin-top:20px;
        }

        .links a{
            color:#06b6d4;
            text-decoration:none;
        }

        .links a:hover{
            text-decoration:underline;
        }

        .back-home{
            text-align:center;
            margin-top:20px;
        }

        .back-home a{
            color:white;
            text-decoration:none;
        }

        .back-home a:hover{
            color:#06b6d4;
        }

        @media(max-width:480px){
            .login-container{
                width:95%;
                padding:25px;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">

        <div class="logo">💊</div>

        <h1>Welcome Back</h1>

        <p class="subtitle">
            Login to access MediBot AI
        </p>

        <form method="POST" action="/login">

            <div class="form-group">
                <label>Email</label>
                <input
                    type="email"
                    name="email"
                    placeholder="Enter your email"
                    required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input
                    type="password"
                    name="password"
                    placeholder="Enter your password"
                    required>
            </div>
<form action="/chat" method="GET">
    <button type="submit" class="login-btn">
        Login
    </button>
</form>
        </form>

        <div class="links">
            Don't have an account?
            <a href="/register">Register</a>
        </div>

        <div class="back-home">
            <a href="/">← Back to Home</a>
        </div>

    </div>

</body>
</html>
