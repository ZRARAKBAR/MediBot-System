<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediBot AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* ===== CONTAINER ===== */
.chat-container{
    width:100%;
    max-width:1000px;
    height:min(95vh,95dvh);

    display:flex;
    flex-direction:column;

    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.08);
    border-radius:20px;

    overflow:hidden;
}

/* ===== HEADER ===== */
.chat-header{
    padding:18px 25px;
    background:linear-gradient(90deg,#06b6d4,#2563eb);

    display:flex;
    justify-content:space-between;
    align-items:center;

    font-size:18px;
    font-weight:600;
}

 .chat-messages{
    flex:1;
    padding:25px;

    overflow-y:auto;

    display:flex;
    flex-direction:column;
    gap:12px;

    background:rgba(0,0,0,0.15);
}

/* Scroll */
.chat-messages::-webkit-scrollbar{
    width:6px;
}
.chat-messages::-webkit-scrollbar-thumb{
    background:#06b6d4;
    border-radius:10px;
}

/* ===== MESSAGE ===== */
.message{
    max-width:80%;
    padding:14px 16px;

    border-radius:16px;
    line-height:1.5;
    font-size:14px;

    opacity:0;
    transform:translateY(10px);
    animation:fadeUp .25s forwards;
}

/* USER */
.user{
    align-self:flex-end;
    background:#2563eb;
}

/* BOT */
.bot{
    align-self:flex-start;
    background:#1e293b;
    border:1px solid rgba(255,255,255,0.08);
}

/* ===== TYPING DOTS ===== */
.typing{
    display:flex;
    gap:4px;
    align-items:center;
}

.dot{
    width:6px;
    height:6px;
    background:#94a3b8;
    border-radius:50%;
    animation:blink 1.2s infinite;
}

.dot:nth-child(2){ animation-delay:.2s; }
.dot:nth-child(3){ animation-delay:.4s; }

/* ===== INPUT ===== */
.chat-input{
    display:flex;
    gap:10px;
    padding:15px;
    background:#0f172a;
    border-top:1px solid rgba(255,255,255,0.08);
}

.chat-input input{
    flex:1;
    padding:14px;
    border:none;
    outline:none;

    border-radius:12px;
    background:#1e293b;
    color:white;
}

/* BUTTON */
.chat-input button{
    padding:14px 20px;
    border:none;
    border-radius:12px;

    background:linear-gradient(90deg,#06b6d4,#2563eb);
    color:white;
    font-weight:600;

    cursor:pointer;
    transition:.2s;
}

.chat-input button:hover{
    transform:translateY(-2px);
}

/* ===== ANIMATIONS ===== */
@keyframes fadeUp{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes blink{
    0%,100%{opacity:.2;}
    50%{opacity:1;}
}
/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 768px){

body{
    padding:0;
    height:100dvh;
    overflow:hidden;
}
.chat-header > div:last-child{
    font-size:12px;
    padding:6px 10px !important;
}

    

    .chat-header small{
        font-size:11px;
    }

    .chat-messages{
        padding:15px;
    }

    .message{
        max-width:90%;
        font-size:13px;
        padding:12px;
    }
    .chat-container{
        width:100vw;
        height:100dvh;
        max-width:none;
        border-radius:0;
    }

    .chat-input{
        padding:10px;
        gap:6px;
    }

    .chat-input input{
        padding:12px;
        font-size:14px;
    }

    .chat-input button{
        padding:12px 14px;
        font-size:14px;
    }
   
    .creator-badge{
        padding:6px 10px;
        font-size:12px;
    }
 
}
.creator-badge{
    background:rgba(255,255,255,.15);
    padding:8px 15px;
    border-radius:30px;
}
</style>
</head>

<body>

<div class="chat-container">

  <div class="chat-header">
    <div style="display:flex;align-items:center;gap:12px;">
        <div style="
            width:45px;
            height:45px;
            border-radius:50%;
            background:rgba(255,255,255,.15);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:20px;">
            🩺
        </div>

        <div>
            <div style="font-weight:700;">MediBot AI</div>
            <small style="opacity:.8;">Medical Assistant</small>
        </div>
    </div>

    <div class="creator-badge">
    By Zrar
</div>
</div>

    <!-- CHAT -->
    <div class="chat-messages" id="chatBox">

        <div class="message bot">
            👋 Hello! I am MediBot AI. How can I help you today?
        </div>

    </div>

    <!-- INPUT -->
    <div class="chat-input">
        <input type="file" id="imageInput" accept="image/*" hidden>
<button onclick="document.getElementById('imageInput').click()"> +</button>
        <input type="text" id="userInput" placeholder="Ask about symptoms, disease or medicine..."
        onkeydown="if(event.key==='Enter'){sendMessage()}">

        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

</div>

<script>

/* ===== SCROLL ===== */
function scrollToBottom(){
    let chat = document.getElementById("chatBox");
    chat.scrollTop = chat.scrollHeight;
}

/* ===== TYPING EFFECT ===== */
function typingIndicator(){
    let div = document.createElement("div");
    div.className = "message bot";

    div.innerHTML = `
        <div class="typing">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    `;

    div.id = "typing";
    return div;
}

/* ===== SEND MESSAGE ===== */
async function sendMessage(){

    let input = document.getElementById("userInput");
    let chatBox = document.getElementById("chatBox");
    let btn = document.getElementById("sendBtn");

    let message = input.value.trim();
    if(message === "") return;

    /* USER MSG */
    let userDiv = document.createElement("div");
    userDiv.className = "message user";
    userDiv.innerText = message;
    chatBox.appendChild(userDiv);

    input.value = "";
    scrollToBottom();

    /* DISABLE BUTTON */
    btn.disabled = true;
    btn.innerText = "..."

    /* TYPING */
    let typing = typingIndicator();
    chatBox.appendChild(typing);
    scrollToBottom();

    try{
        let fd = new FormData();
        fd.append("msg", message);

        const resp = await fetch("/get", {
            method:"POST",
            body:fd
        });

        const data = await resp.json();

        /* simulate natural AI delay */
        await new Promise(r => setTimeout(r, 800));

        document.getElementById("typing").remove();

        let botDiv = document.createElement("div");
        botDiv.className = "message bot";

        /* typing reveal effect */
        let text = data.response;
        botDiv.innerText = "";
chatBox.appendChild(botDiv);

let i = 0;

function typeWriter() {
    if (i < text.length) {
        botDiv.innerText = text.substring(0, i + 1);
        i++;
        scrollToBottom();
        setTimeout(typeWriter, 12);
    } else {
        btn.disabled = false;
        btn.innerText = "Send";
    }
}

typeWriter();
    }catch(e){

        document.getElementById("typing").remove();

        let err = document.createElement("div");
        err.className = "message bot";
        err.innerText = "⚠ Connection error. Try again.";
        chatBox.appendChild(err);

        btn.disabled = false;
        btn.innerText = "Send";
    }

    scrollToBottom();
}

</script>
<script>
        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('query');

            if (query) {
                // This sends the message to your Flask route @app.route("/get")
                fetch('/get', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ 'msg': query })
                })
                .then(response => response.json())
                .then(data => {
                    // REPLACE 'displayMessage' with the name of the 
                    // JavaScript function you already use to show 
                    // messages in your chat UI.
                    displayMessage(data.response); 
                });
            }
        });
    </script>
</body>
</html>
